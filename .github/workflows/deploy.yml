name: Build & Deploy — FG Cursos

on:
  push:
    branches: [main]

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/fgcursos

jobs:
  # ──────────────────────────────────────────────
  # 1. Build da imagem e push para Docker Hub
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 2. Aciona o Portainer via webhook para
  #    puxar a nova imagem e redeployar a stack
  # ──────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger Portainer webhook
        run: |
          if [ -z "${{ secrets.PORTAINER_WEBHOOK_URL }}" ]; then
            echo "⚠️  PORTAINER_WEBHOOK_URL não configurado — skipping deploy automático."
            echo "Configure o secret no GitHub para ativar o redeploy automático."
            exit 0
          fi
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          echo "Portainer webhook respondeu: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "Falha ao acionar o Portainer (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Stack redeploy acionado com sucesso."
