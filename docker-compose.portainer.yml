# Stack para Portainer — FG Cursos
# Imagens vêm do Docker Hub (publicadas pelo GitHub Actions).
# O nginx-proxy-manager roteia portal.fgcentroeducacional.com.br → fgcursos_web:8000
# via o network externo compartilhado "proxy".
#
# Pré-requisito (rodar uma vez no servidor):
#   docker network create proxy
# E adicionar esse network ao container do nginx-proxy-manager via Portainer.

services:
  db:
    image: postgres:16-alpine
    container_name: fgcursos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - fgcursos_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fgcursos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - fgcursos_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${DOCKERHUB_USERNAME}/fgcursos:latest
    container_name: fgcursos_web
    restart: unless-stopped
    # Sem ports: — o NPM acessa via network "proxy" usando o nome do container
    env_file: stack.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - fgcursos_media:/app/media
    networks:
      - default
      - proxy

  celery:
    image: ${DOCKERHUB_USERNAME}/fgcursos:latest
    container_name: fgcursos_celery
    restart: unless-stopped
    command: celery -A fgcursos worker -l info -c 2
    env_file: stack.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    image: ${DOCKERHUB_USERNAME}/fgcursos:latest
    container_name: fgcursos_beat
    restart: unless-stopped
    command: celery -A fgcursos beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: stack.env
    depends_on:
      - redis
      - db

volumes:
  fgcursos_postgres:
  fgcursos_redis:
  fgcursos_media:

networks:
  proxy:
    external: true   # criado uma vez: docker network create proxy
  default:
    driver: bridge
