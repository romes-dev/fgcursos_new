{% extends 'base_dashboard.html' %}
{% block title %}Meu Perfil — FG Cursos{% endblock %}

{% block dashboard_content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Meu Perfil</h1>

<div class="bg-white rounded-2xl border border-gray-200 p-6">
  <form method="post" enctype="multipart/form-data" novalidate>
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      {% for field in form %}
      <div {% if field.name == 'address' %}class="md:col-span-2"{% endif %}>
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
        {% endif %}
      </div>
      {% endfor %}
    </div>

    <div class="mt-6 flex gap-3">
      <button type="submit" class="bg-primary-700 hover:bg-primary-800 text-white font-semibold px-6 py-2.5 rounded-xl transition-colors">
        Salvar alterações
      </button>
    </div>
  </form>
</div>
{% endblock %}
