{% extends 'base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div class="flex gap-8">
    <!-- Sidebar -->
    <aside class="hidden lg:block w-64 shrink-0">
      <div class="bg-white rounded-xl border border-gray-200 p-4 sticky top-24">
        <div class="flex items-center gap-3 mb-6 pb-4 border-b border-gray-100">
          <div class="w-10 h-10 rounded-full bg-primary-600 flex items-center justify-center text-white font-bold text-lg">
            {{ request.user.first_name|first|upper }}
          </div>
          <div>
            <p class="font-semibold text-sm text-gray-900">{{ request.user.get_full_name }}</p>
            <p class="text-xs text-gray-500">{{ request.user.email }}</p>
          </div>
        </div>
        <nav class="space-y-1">
          <a href="{% url 'dashboard:home' %}"
             class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium
                    {% if request.resolver_match.url_name == 'home' %}bg-primary-50 text-primary-700{% else %}text-gray-600 hover:bg-gray-50{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Meus Cursos
          </a>
          <a href="{% url 'accounts:profile' %}"
             class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            Meu Perfil
          </a>
          <a href="{% url 'accounts:logout' %}"
             class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-red-500 hover:bg-red-50">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            Sair
          </a>
        </nav>
      </div>
    </aside>

    <!-- Main content -->
    <div class="flex-1 min-w-0">
      {% block dashboard_content %}{% endblock %}
    </div>
  </div>
</div>
{% endblock %}
