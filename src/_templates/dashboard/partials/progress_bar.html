{% if completion_percent == 100 %}
<div class="flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl text-sm font-medium">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
  </svg>
  Aula concluída! Curso {{ completion_percent }}% completo.
  {% if enrollment.certificate_file %}
  <a href="{% url 'dashboard:certificate' enrollment.pk %}" class="underline ml-2">Baixar certificado</a>
  {% endif %}
</div>
{% else %}
<div class="flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl text-sm font-medium">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
  </svg>
  Aula concluída! Progresso: {{ completion_percent }}%
</div>
{% endif %}
