{% extends 'base.html' %}
{% block title %}Pagamento Confirmado — FG Cursos{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-20 text-center">
  <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
    <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
  </div>
  <h1 class="text-3xl font-bold text-gray-900 mb-3">Pagamento confirmado!</h1>
  <p class="text-gray-500 mb-8">
    Seu pagamento foi aprovado. Em instantes você receberá um e-mail de confirmação com os detalhes da sua matrícula.
  </p>
  <a href="{% url 'dashboard:home' %}"
     class="inline-block bg-primary-700 hover:bg-primary-800 text-white font-bold px-8 py-3 rounded-xl transition-colors">
    Acessar Minha Área
  </a>
</div>
{% endblock %}
