{% extends 'base.html' %}
{% block title %}Recuperar senha — FG Cursos{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full">
    <div class="text-center mb-8">
      <a href="{% url 'core:home' %}" class="inline-flex items-center gap-2 font-bold text-2xl text-primary-700 mb-4">
        <span class="bg-primary-700 text-white rounded-lg px-2 py-1 text-sm font-black">FG</span>
        Cursos
      </a>
      <h1 class="text-2xl font-bold text-gray-900">Recuperar senha</h1>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
          {{ form.email }}
        </div>
        <button type="submit" class="w-full bg-primary-700 hover:bg-primary-800 text-white font-bold py-3 rounded-xl transition-colors">
          Enviar instruções
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
